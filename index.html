<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DrawkiFlow — Your Tools, One Place</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --flowly: #c8f135;
    --drawki: #7c6ff7;
    --drawki-pink: #e8547a;
    --tempo: #ff6b2b;
    --tempo-gold: #ffd166;
    --nexus: #00d9a0;
    --wikiuse: #3b82f6;
    --gigapdf: #f43f5e;
    --bg: #080810;
    --border: rgba(255,255,255,0.08);
  }

  html, body { width:100%; height:100%; overflow:hidden; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: none;
    position: relative;
  }

  /* ── CUSTOM CURSOR ── */
  .cursor {
    position:fixed; width:10px; height:10px;
    border-radius:50%; background:white;
    pointer-events:none; z-index:9999;
    mix-blend-mode:difference;
    transition: transform 0.1s ease;
  }
  .cursor.clicking { transform: scale(0.6); }
  .cursor-ring {
    position:fixed; width:32px; height:32px;
    border-radius:50%; border:1px solid rgba(255,255,255,0.35);
    pointer-events:none; z-index:9998;
    transition: transform 0.22s ease, opacity 0.22s ease, border-color 0.3s ease;
  }
  .cursor-ring.hovering {
    border-color: rgba(255,255,255,0.7);
  }

  /* ── AURORA BG ── */
  .aurora { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .aurora-blob { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.11; animation:drift ease-in-out infinite alternate; }
  .a1 { width:650px;height:520px; background:var(--flowly); top:-120px;left:-180px; animation-duration:16s; }
  .a2 { width:550px;height:450px; background:var(--drawki); bottom:-100px;right:-120px; animation-duration:20s; animation-delay:-7s; }
  .a3 { width:380px;height:380px; background:var(--tempo); top:50%;left:50%; transform:translate(-50%,-50%); animation-duration:11s; animation-delay:-3s; opacity:0.065; }
  .a4 { width:320px;height:320px; background:var(--tempo-gold); bottom:10%;right:28%; animation-duration:24s; animation-delay:-10s; opacity:0.055; }
  .a5 { width:280px;height:280px; background:var(--gigapdf); top:20%;right:10%; animation-duration:19s; animation-delay:-5s; opacity:0.045; }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(45px,35px) scale(1.1); }
  }

  /* ── GRID ── */
  .grid {
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── NOISE ── */
  body::after {
    content:''; position:fixed; inset:0; z-index:2; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.5;
  }

  /* ── FLOATING PARTICLES ── */
  .particles { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
  .p-dot { position:absolute; border-radius:50%; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0%   { transform:translateY(0) scale(1); opacity:0; }
    8%   { opacity:1; }
    88%  { opacity:0.4; }
    100% { transform:translateY(-108vh) scale(0.3); opacity:0; }
  }

  /* ── CORNER MARKS ── */
  .corner { position:fixed; z-index:20; width:28px; height:28px; }
  .corner svg line { stroke:rgba(255,255,255,0.1); stroke-width:1; }
  .corner-tl { top:18px; left:18px; }
  .corner-tr { top:18px; right:18px; transform:rotate(90deg); }
  .corner-bl { bottom:18px; left:18px; transform:rotate(-90deg); }
  .corner-br { bottom:18px; right:18px; transform:rotate(180deg); }

  /* ── SIDE LABELS ── */
  .side-label {
    position:fixed; z-index:20;
    font-family:'JetBrains Mono', monospace; font-size:8px;
    letter-spacing:0.3em; writing-mode:vertical-rl;
    text-orientation:mixed; opacity:0.18;
    top:50%;
  }
  .side-label.left  { left:22px;  color:var(--flowly); transform:translateY(-50%) rotate(180deg); }
  .side-label.right { right:22px; color:var(--tempo);  transform:translateY(-50%); }

  /* ── GITHUB BUTTON ── */
  .github-btn {
    position:fixed; top:18px; right:18px; z-index:50;
    display:flex; align-items:center; gap:8px;
    padding:7px 14px 7px 11px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:999px;
    color:rgba(255,255,255,0.55);
    font-family:'Outfit', sans-serif; font-size:12px; font-weight:500;
    text-decoration:none; cursor:pointer;
    backdrop-filter:blur(16px);
    transition:all 0.3s ease;
    animation:slideDown 0.6s 0.5s both;
  }
  .github-btn:hover {
    background:rgba(255,255,255,0.09);
    border-color:rgba(255,255,255,0.22);
    color:white; transform:translateY(-2px);
    box-shadow:0 8px 28px rgba(0,0,0,0.55);
  }
  .gh-badge {
    font-family:'JetBrains Mono',monospace; font-size:9px;
    color:var(--flowly); background:rgba(200,241,53,0.07);
    border:1px solid rgba(200,241,53,0.18);
    border-radius:999px; padding:2px 7px;
    transition: background 0.3s, border-color 0.3s;
  }
  .github-btn:hover .gh-badge { background:rgba(200,241,53,0.14); border-color:rgba(200,241,53,0.38); }

  @keyframes slideDown {
    from { opacity:0; transform:translateY(-14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── MAIN WRAPPER ── */
  .wrapper {
    position:relative; z-index:20;
    display:flex; flex-direction:column;
    align-items:center; gap:18px;
    animation:riseUp 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes riseUp {
    from { opacity:0; transform:translateY(36px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:0.45em;
    text-transform:uppercase; color:rgba(255,255,255,0.22);
    text-align:center;
    animation: fadeIn 0.9s 0.1s both;
  }

  /* ── BRAND LOGO ── */
  .brand {
    display:flex; align-items:baseline; gap:0;
    line-height:1;
    animation: letterPop 0.8s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    position: relative;
  }
  /* subtle shimmer sweep on brand */
  .brand::after {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: shimmer 5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .brand-drawki {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 110px);
    letter-spacing: -0.01em;
    background: linear-gradient(110deg, var(--drawki) 0%, var(--drawki-pink) 55%, var(--flowly) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 44px rgba(124,111,247,0.38));
  }
  .brand-flow {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 110px);
    letter-spacing: -0.01em;
    background: linear-gradient(110deg, var(--flowly) 0%, #9ef53a 40%, var(--tempo-gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 44px rgba(200,241,53,0.32));
  }
  .brand-dot {
    font-family:'Bebas Neue', sans-serif;
    font-size: clamp(20px, 3.5vw, 44px);
    color: rgba(255,255,255,0.13);
    margin: 0 4px;
    align-self: center;
    -webkit-text-fill-color: rgba(255,255,255,0.13);
  }
  @keyframes letterPop {
    from { opacity:0; transform:translateY(28px) skewX(-5deg); }
    to   { opacity:1; transform:translateY(0) skewX(0); }
  }

  /* ── TAGLINE ── */
  .tagline {
    display:flex; align-items:center; gap:10px;
    animation: fadeIn 0.9s 0.35s both;
  }
  .tagline-word {
    font-family:'JetBrains Mono', monospace;
    font-size: clamp(9px, 1.1vw, 12px);
    letter-spacing:0.3em;
    text-transform:uppercase;
    transition: opacity 0.2s;
  }
  .tagline-word:hover { opacity: 0.7; }
  .tw-flowly { color:var(--flowly); }
  .tw-drawki { color:var(--drawki); }
  .tw-tempo  { color:var(--tempo); }
  .tagline-sep { width:28px; height:1px; background:rgba(255,255,255,0.1); }

  /* ── PILL BADGES ── */
  .badges {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center;
    animation: fadeIn 0.9s 0.5s both;
  }
  .badge {
    font-family:'JetBrains Mono', monospace;
    font-size:9px; letter-spacing:0.2em;
    padding:5px 14px; border-radius:999px;
    border:1px solid; text-transform:uppercase;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    cursor: default;
  }
  .badge:hover { transform: translateY(-2px); }
  .badge-flowly { color:var(--flowly); border-color:rgba(200,241,53,0.22); background:rgba(200,241,53,0.05); }
  .badge-flowly:hover { background:rgba(200,241,53,0.1); box-shadow:0 4px 20px rgba(200,241,53,0.15); }
  .badge-drawki { color:var(--drawki); border-color:rgba(124,111,247,0.22); background:rgba(124,111,247,0.05); }
  .badge-drawki:hover { background:rgba(124,111,247,0.1); box-shadow:0 4px 20px rgba(124,111,247,0.15); }
  .badge-tempo  { color:var(--tempo);  border-color:rgba(255,107,43,0.22);  background:rgba(255,107,43,0.05); }
  .badge-tempo:hover  { background:rgba(255,107,43,0.1);  box-shadow:0 4px 20px rgba(255,107,43,0.15); }

  /* ── BOTTOM TAG ── */
  .bottom-tag {
    font-family:'JetBrains Mono', monospace;
    font-size:8px; letter-spacing:0.35em;
    color:rgba(255,255,255,0.1); text-align:center;
    animation: fadeIn 0.9s 0.65s both;
  }
  .bottom-tag span { color:rgba(255,255,255,0.18); }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ══════════════════════
     DOCK
  ══════════════════════ */
  .dock-outer {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    height: 100px;
    animation: dockRise 0.8s cubic-bezier(0.22,1,0.36,1) 0.4s both;
  }
  @keyframes dockRise {
    from { opacity:0; transform:translateX(-50%) translateY(20px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
  .dock-panel {
    display: flex;
    align-items: flex-end;
    gap: 9px;
    padding: 0 14px 10px;
    background: rgba(10,10,20,0.72);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 22px;
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    box-shadow:
      0 8px 48px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(255,255,255,0.055),
      inset 0 -1px 0 rgba(0,0,0,0.4);
    height: 76px;
    transition: box-shadow 0.3s ease;
  }
  .dock-panel:hover {
    box-shadow:
      0 12px 56px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,255,255,0.07),
      inset 0 -1px 0 rgba(0,0,0,0.4);
  }
  .dock-item {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    cursor: pointer;
    flex-shrink: 0;
    overflow: visible;
    transition: border-color 0.2s ease, box-shadow 0.25s ease;
    will-change: width, height;
  }
  .dock-item:hover {
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .dock-item svg { pointer-events: none; display: block; transition: filter 0.2s ease; }
  .dock-item:hover svg { filter: brightness(1.15); }

  .dock-label {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    white-space: nowrap;
    background: rgba(8,8,18,0.92);
    border: 1px solid rgba(255,255,255,0.11);
    border-radius: 8px;
    padding: 5px 11px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    color: rgba(255,255,255,0.82);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.18s ease;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  /* little triangle arrow */
  .dock-label::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(255,255,255,0.11);
    margin-top: -1px;
  }
  .dock-label::before {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(8,8,18,0.92);
    z-index: 1;
  }
  .dock-item:hover .dock-label { opacity:1; transform:translateX(-50%) translateY(0); }
  .dock-sep {
    width: 1px; height: 36px;
    background: rgba(255,255,255,0.07);
    align-self: center; flex-shrink: 0; margin: 0 1px;
  }
  .dock-dot {
    position: absolute;
    bottom: -7px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    border-radius: 50%; opacity: 0.5;
    transition: opacity 0.2s, transform 0.2s;
  }
  .dock-item:hover .dock-dot { opacity: 0.85; transform: translateX(-50%) scale(1.3); }

  /* ══════════════════════
     LOADING SCREEN — improved
  ══════════════════════ */
  #loadingScreen {
    position: fixed;
    inset: 0;
    z-index: 9990;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  #loadingScreen.visible {
    pointer-events: all;
    opacity: 1;
  }
  #loadingScreen.hiding {
    opacity: 0;
    transition: opacity 0.45s ease;
  }

  .loading-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(124,111,247,0.48) 0%, transparent 55%),
                radial-gradient(ellipse at 70% 65%, rgba(200,241,53,0.32) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(232,84,122,0.22) 0%, transparent 60%),
                rgba(8,8,16,0.9);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
  }
  .loading-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(124,111,247,0.14) 0%, transparent 40%, rgba(200,241,53,0.09) 70%, transparent 100%);
    animation: gradientSweep 3.5s ease-in-out infinite alternate;
  }
  @keyframes gradientSweep {
    from { opacity: 0.5; transform: scale(1) rotate(0deg); }
    to   { opacity: 1;   transform: scale(1.06) rotate(2.5deg); }
  }
  .loading-label {
    position: relative;
    z-index: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    animation: labelPulse 2s ease-in-out infinite;
  }
  @keyframes labelPulse {
    0%, 100% { opacity: 0.45; }
    50%       { opacity: 0.85; }
  }
  .loading-icon-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loading-glow {
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--loading-color, #7c6ff7) 0%, transparent 70%);
    opacity: 0.22;
    animation: glowPulse 2.2s ease-in-out infinite;
    filter: blur(24px);
  }
  @keyframes glowPulse {
    0%, 100% { transform: scale(0.88); opacity: 0.18; }
    50%       { transform: scale(1.22); opacity: 0.38; }
  }
  .loader {
    --cloud-color: #4387f4;
    --arrows-color: #80b1ff;
    --time-animation: 1s;
    transform: scale(1.3);
    position: relative;
    z-index: 1;
  }
  .loader #cloud { width: 100px; height: 100px; }
  .loader #cloud rect { fill: var(--cloud-color); }
  .loader #cloud g:nth-child(3) {
    transform-origin: 50% 72.8938%;
    fill: var(--arrows-color);
    filter: drop-shadow(0 0 8px black);
    animation: rotation var(--time-animation) linear infinite;
  }
  @keyframes rotation {
    0%   { transform: rotate(0deg); }
    50%  { transform: rotate(180deg); }
    100% { transform: rotate(360deg); }
  }
  .loading-toolname {
    position: relative;
    z-index: 1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    letter-spacing: 0.14em;
    color: white;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.4s 0.18s ease, transform 0.4s 0.18s ease;
    text-shadow: 0 0 36px var(--loading-color, #7c6ff7);
  }
  #loadingScreen.visible .loading-toolname {
    opacity: 1;
    transform: translateY(0);
  }
  .loading-bar-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(255,255,255,0.05);
    z-index: 2;
    overflow: hidden;
  }
  .loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--loading-color, #7c6ff7), rgba(255,255,255,0.7));
    animation: barFill 1.5s cubic-bezier(0.4,0,0.2,1) forwards;
    box-shadow: 0 0 14px var(--loading-color, #7c6ff7);
  }
  @keyframes barFill {
    0%   { width: 0%; }
    55%  { width: 72%; }
    88%  { width: 91%; }
    100% { width: 100%; }
  }
  .loading-scanline {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 4px);
    pointer-events: none;
    z-index: 1;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    0%   { background-position: 0 0; }
    100% { background-position: 0 40px; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="aurora">
  <div class="aurora-blob a1"></div>
  <div class="aurora-blob a2"></div>
  <div class="aurora-blob a3"></div>
  <div class="aurora-blob a4"></div>
  <div class="aurora-blob a5"></div>
</div>

<div class="grid"></div>
<div class="particles" id="particles"></div>

<div class="corner corner-tl"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-tr"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-bl"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>
<div class="corner corner-br"><svg viewBox="0 0 28 28"><line x1="0" y1="0" x2="28" y2="0"/><line x1="0" y1="0" x2="0" y2="28"/></svg></div>

<div class="side-label left">FLOWLY · DRAWKI · TEMPO</div>
<div class="side-label right">DRAWKIFLOW · SUITE 2025</div>

// ── CURSOR ──
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = -100, my = -100, rx = -100, ry = -100;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursor.classList.remove('clicking'));

(function tick() {
  cursor.style.left = mx - 5 + 'px';
  cursor.style.top  = my - 5 + 'px';
  rx += (mx - rx) * 0.13;
  ry += (my - ry) * 0.13;
  ring.style.left = rx - 16 + 'px';
  ring.style.top  = ry - 16 + 'px';
  requestAnimationFrame(tick);
})();

const enlargeRing = () => { ring.classList.add('hovering'); ring.style.transform = 'scale(1.9)'; ring.style.opacity = '0.45'; };
const resetRing   = () => { ring.classList.remove('hovering'); ring.style.transform = 'scale(1)'; ring.style.opacity = '1'; };
document.querySelectorAll('.github-btn').forEach(el => {
  el.addEventListener('mouseenter', enlargeRing);
  el.addEventListener('mouseleave', resetRing);
});

  d.className = 'p-dot';

}

];

// ── DOCK BUILD ──
const BASE = 48, MAG = 84, DISTANCE = 176, STIFFNESS = 0.20, DAMPING = 0.68;
const panelEl = document.getElementById('dockPanel');
const realItems = [];

DOCK_ITEMS.forEach(item => {
  if (item.sep) {
    const sep = document.createElement('div');
    sep.className = 'dock-sep';
    panelEl.appendChild(sep);
    return;
  }
  const el = document.createElement('a');
  el.className = 'dock-item';
  el.href = item.href;
  if (item.external) el.target = '_blank';
  el.style.background = item.bg;
  el.innerHTML = `${item.icon}<div class="dock-label">${item.label}</div><div class="dock-dot" style="background:${item.dotColor};"></div>`;
  panelEl.appendChild(el);

  el.addEventListener('mouseenter', enlargeRing);
  el.addEventListener('mouseleave', resetRing);

  if (!item.external) {
    el.addEventListener('click', e => {
      e.preventDefault();
      showLoadingScreen(item.label, item.dotColor, item.href);
    });
  }
  realItems.push({ el, spring: { pos: BASE, vel: 0 } });
});

// ── DOCK MAGNIFICATION ──
let dockMouseX = null;
panelEl.addEventListener('mousemove', e => { dockMouseX = e.clientX; });
panelEl.addEventListener('mouseleave', () => { dockMouseX = null; });

function getTarget(el) {
  if (dockMouseX === null) return BASE;
  const r = el.getBoundingClientRect();
  const mid = r.left + r.width / 2;
  const dist = Math.abs(dockMouseX - mid);
  if (dist >= DISTANCE) return BASE;
  const t = 1 - dist / DISTANCE;
  return BASE + (MAG - BASE) * t * t;
}

// ── LOADING SCREEN ──
const loadingScreen  = document.getElementById('loadingScreen');
const loadingLabel   = document.getElementById('loadingLabel');
const loadingToolname = document.getElementById('loadingToolname');
const loadingGlow    = document.getElementById('loadingGlow');
const loadingBarEl   = document.getElementById('loadingBar');

function setLoaderColor(color) {
  loadingScreen.style.setProperty('--loading-color', color);
  loadingGlow.style.setProperty('--loading-color', color);
  loadingToolname.style.setProperty('--loading-color', color);
  const cloudRect = loadingScreen.querySelector('#cloud rect');
  const arrowsG   = loadingScreen.querySelector('#cloud > g');
  if (cloudRect) cloudRect.style.fill = color;
  if (arrowsG) {
    arrowsG.style.fill   = color + 'cc';
    arrowsG.style.filter = `drop-shadow(0 0 9px ${color})`;
  }
}

function showLoadingScreen(label, color, href) {
  // reset bar animation
  loadingBarEl.style.animation = 'none';
  loadingBarEl.offsetHeight; // reflow
  loadingBarEl.style.animation = 'barFill 1.5s cubic-bezier(0.4,0,0.2,1) forwards';

  loadingLabel.textContent   = 'Launching';
  loadingToolname.textContent = label;
  setLoaderColor(color);
  loadingScreen.classList.remove('hiding');
  loadingScreen.classList.add('visible');

  setTimeout(() => {
    loadingScreen.classList.add('hiding');
    setTimeout(() => { window.location.href = href; }, 450);
  }, 1550);
}

// ── DOCK SPRING ANIMATION ──
(function dockTick() {
  realItems.forEach(({ el, spring }) => {
    const target = getTarget(el);
    const force  = (target - spring.pos) * STIFFNESS;
    spring.vel   = (spring.vel + force) * DAMPING;
    spring.pos  += spring.vel;
    const sz = Math.max(BASE, spring.pos);
    el.style.width        = sz + 'px';
    el.style.height       = sz + 'px';
    el.style.borderRadius = Math.round(sz * 0.215) + 'px';
    const svgEl = el.querySelector('svg');
    if (svgEl) {
      const iconSz = Math.round(26 * (sz / BASE));
      svgEl.setAttribute('width',  Math.min(iconSz, 42));
      svgEl.setAttribute('height', Math.min(iconSz, 42));
    }
  });
  requestAnimationFrame(dockTick);
})();
</script>
